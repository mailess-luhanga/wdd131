<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Responsive Images Activity">
    <meta name="author" content="Mailess Luhanga">
    <title>Responsive Images</title>

    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>

    <header>
        <h1>Responsive Images</h1>
    </header>

    <main>
        <div class="hero">
            <picture>
                <!-- Large image -->
                <source
                    srcset="images/hero-large.webp"
                    media="(min-width: 1000px)">

                <!-- Medium image -->
                <source
                    srcset="images/hero-medium.webp"
                    media="(min-width: 500px)">

                <!-- Small image (default) -->
                <img
                    src="images/hero-small.webp"
                    alt="Temple name and location"
                    width="1500"
                    height="750">
            </picture>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mailess Luhanga | WDD 131</p>
    </footer>

</body>
</html>
